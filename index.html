<!doctype HTML>
<html>

<head>
    <meta charset="utf-8">
    <title>AR • EDP PACKS FOLDER</title>
    <meta name="description" content="AR • EDP PACKS FOLDER">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://aframe.io/releases/0.8.2/aframe.min.js"></script>
    <script src="https://rawgit.com/jeromeetienne/AR.js/master/aframe/build/aframe-ar.js""></script>
</head>

<body style="margin : 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono; maxDetectionRate: 60; canvasWidth: 200; canvasHeight: 200">
        <a-assets>
            <video id="sheep" autoplay loop="true" src="./res/sheep.mp4" crossorigin></video>
            <video id="box" autoplay muted loop="true" src="./res/box.mp4" crossorigin></video>
            <video id="packs" autoplay muted loop="true" src="./res/packs.mp4" crossorigin></video>
            <video id="vant" autoplay muted loop="true" src="./res/packs.mp4" crossorigin></video>
            <video id="saude" autoplay muted loop="true" src="./res/packs.mp4" crossorigin></video>
            <video id="serv" autoplay muted loop="true" src="./res/packs.mp4" crossorigin></video>
        </a-assets>
        
        <a-marker id="memarker" type="pattern" url="./patt/hiro.patt"> <!-- VERSO -->
            <a-video src="#sheep" position="0 0 0" height="4" width="2" rotation="0 0 0"></a-video>
        </a-marker>
                                                                                   
        <a-marker type="barcode" value="12"> <!-- FRENTE -->
            <a-video src="#box" position="0 0 0" height="4" width="2" rotation="-90 0 0"></a-video>
        </a-marker>
                                                                                   
                                                                                   
        <a-marker type="barcode" value="8"> <!-- VANTAGENS -->
            <a-video src="#box" width="3" height="1.25" rotation="0 0 0" position="0 0 0"></a-video>
        </a-marker>
                <a-marker type="barcode" value="14"> <!-- SAUDE -->
            <a-video src="#saude" width="3" height="1.25" rotation="0 0 0" position="0 0 0"></a-video>
        </a-marker>
                <a-marker type="barcode" value="15"> <!-- FUNCIONA -->
            <a-video src="#serv" width="3" height="1.25" rotation="0 0 0" position="0 0 0"></a-video>
        </a-marker>
                <a-marker type="barcode" value="31"> <!-- PACKS -->
            <a-video src="#packs" width="3" height="1.25" rotation="0 0 0" position="0 0 0"></a-video>
        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>
</body>

</html>
