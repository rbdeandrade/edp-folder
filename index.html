
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR • PACKS LIVING EDP</title>

    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <script src="https://aframe.io/releases/0.9.2/aframe.min.js"></script>

<body style="margin : 0px; overflow: hidden;">
    <a-scene embedded arjs="detectionMode: mono_and_matrix; trackingMethod: best; sourceType: webcam; debugUIEnabled: false;">

<!-- Folder -->

        <a-marker preset="hiro">
            <a-video src="#packs" width="4" height="2.25" position="0 0 0"></a-video>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

</html>
