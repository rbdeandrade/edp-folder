<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR • PACKS LIVING EDP</title>
    <meta name="description" content="PACKS LIVING EDP">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://aframe.io/releases/0.8.2/aframe.min.js"></script>
    <script src="https://rawgit.com/jeromeetienne/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style='margin : 0,0,0; overflow: hidden;'>
    <a-scene embedded arjs='detectionMode: mono_and_matrix; trackingMethod: best; sourceType: webcam; debugUIEnabled: false;'>
        <a-entity camera></a-entity>
        <a-assets>
            <a-asset-item id='sheep' src='./res/sheep.mp4'></a-asset-item>
            <a-asset-item id='box' src='./res/box.mp4' preload="auto" autoplay loop="true"  webkit-playsinline playsinline></a-asset-item>
            <a-asset-item id='pack' src='./res/pack.mp4'></a-asset-item>
            
            <video preload="auto" id="vid" loop="true" autoplay crossorigin webkit-playsinline playsinline>
                <source  type="video/mp4"  src="./res/sheep.mp4">
            </video>
        </a-assets>

<!-- Folder -->
        
        <a-marker preset="hiro" vidhandler>
            <a-video src="#vid" width="3" height="1.25" rotation="0 0 0" position="0 0 0"></a-video>
        </a-marker>
        
        <a-entity camera></a-entity>
        
    </a-scene>

</body>
</html>
