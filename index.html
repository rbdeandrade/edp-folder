<!DOCTYPE html>
<html>
    
<head>
    <meta charset="utf-8">
    <title>AR • Chess</title>
    <meta name="description" content="AR • Chess">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <script src="https://aframe.io/releases/0.8.2/aframe.min.js"></script>
    <script src="https://rawgit.com/jeromeetienne/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
    
<body style='margin : 0px; overflow: hidden;'>
    
    <a-scene embedded arjs='detectionMode: mono_and_matrix; trackingMethod: best; sourceType: webcam; debugUIEnabled: false;'>
        
        <a-assets>
            <video id="sheep" autoplay loop="true" src="./res/sheep.mp4"></video>
            <video id="box" autoplay muted loop="true" src="./res/box.mp4"></video>
            <video id="packs" autoplay muted loop="true" src="./res/packs.mp4"></video>
            <video id="vant" autoplay muted loop="true" src="./res/packs.mp4"></video>
            <video id="saude" autoplay muted loop="true" src="./res/packs.mp4"></video>
            <video id="serv" autoplay muted loop="true" src="./res/packs.mp4"></video>
        </a-assets>
        
        <a-marker crossorigin="anonymous" id="memarker" type="pattern" url="./patt/hiro.patt" vidhandler> <!-- VERSO -->
             <a-video src="#sheep" width="3" height="1.25" rotation="-90 -180 -180" position="0 0 0"></a-video>
        </a-marker>                                                              
        <a-marker type="barcode" value="12"> <!-- FRENTE -->
             <a-video src="#box" width="3" height="1.25" rotation="0 0 0" position="0 0 0"></a-video>
        </a-marker>                                                         
        <a-marker type="barcode" value="8"> <!-- VANTAGENS -->
            <a-video src="#box" width="3" height="1.25" rotation="0 0 0" position="0 0 0"></a-video>
        </a-marker>
                <a-marker type="barcode" value="14"> <!-- SAUDE -->
            <a-video src="#saude" width="3" height="1.25" rotation="0 0 0" position="0 0 0"></a-video>
        </a-marker>
                <a-marker type="barcode" value="15"> <!-- FUNCIONA -->
            <a-video src="#serv" width="3" height="1.25" rotation="0 0 0" position="0 0 0"></a-video>
        </a-marker>
                <a-marker type="barcode" value="31"> <!-- PACKS -->
            <a-video src="#packs" width="3" height="1.25" rotation="0 0 0" position="0 0 0"></a-video>
        </a-marker>
        
        <a-entity camera></a-entity>
        
    </a-scene>
    
</body>

</html>
