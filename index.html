<!doctype HTML>
<html>

<head>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">

    <script src="https://aframe.io/releases/0.8.2/aframe.min.js"></script>
    <script src="https://cdn.rawgit.com/jeromeetienne/AR.js/1.6.0/aframe/build/aframe-ar.js"></script>

</head>

<body style="margin : 0px; overflow: hidden;">
    <a-scene embedded artoolkit='sourceType: webcam; detectionMode: mono; maxDetectionRate: 60; canvasWidth: 200; canvasHeight: 200'>
        <a-assets>
            <video id="sheep" autoplay loop="true" src="./res/sheep.mp4"></video>
            <video id="box" autoplay loop="true" src="./res/box.mp4"></video>
            <video id="packs" autoplay loop="true" src="./res/packs.mp4"></video>
            <video id="vant" autoplay loop="true" src="./res/packs.mp4"></video>
            <video id="saude" autoplay loop="true" src="./res/packs.mp4"></video>
            <video id="serv" autoplay loop="true" src="./res/packs.mp4"></video>
        </a-assets>
        <a-marker id="memarker" type="pattern" url="./patt/hiro.patt"> <!-- VERSO -->
            <a-video src="#sheep" width="3" height="1.25" rotation="-90 0 0" position="0 0 0"></a-video>
        </a-marker>
                <a-marker itype="barcode" value="8"> <!-- VANTAGENS -->
            <a-video src="#vant" width="3" height="1.25" rotation="0 0 0" position="0 0 0"></a-video>
        </a-marker>
                <a-marker type="barcode" value="12"> <!-- FRENTE -->
            <a-video src="#box" width="3" height="1.25" rotation="0 0 0" position="0 0 0"></a-video>
        </a-marker>
                <a-marker type="barcode" value="14"> <!-- SAUDE -->
            <a-video src="#saude" width="3" height="1.25" rotation="0 0 0" position="0 0 0"></a-video>
        </a-marker>
                <a-marker type="barcode" value="15"> <!-- FUNCIONA -->
            <a-video src="#serv" width="3" height="1.25" rotation="0 0 0" position="0 0 0"></a-video>
        </a-marker>
                <a-marker type="barcode" value="31"> <!-- PACKS -->
            <a-video src="#packs" width="3" height="1.25" rotation="0 0 0" position="0 0 0"></a-video>
        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>
</body>

</html>
