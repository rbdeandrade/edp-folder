<!doctype HTML>
<html>

<head>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">

<!-- A-FRAME -->
<script src="https://aframe.io/releases/0.9.2/aframe.min.js"></script>
<script 
src="https://cdn.rawgit.com/jeromeetienne/AR.js/1.6.0/aframe/build/aframe- 
ar.js"></script> 
<script src="https://cdn.rawgit.com/donmccurdy/aframe- 
extras/v4.1.2/dist/aframe-extras.min.js"></script> 
<script src="https://rawgit.com/mayognaise/aframe-gif- 
shader/master/dist/aframe-gif-shader.min.js"></script> 

<!-- jQuery library -->
<script 
 src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"> 
</script> 

<!-- Latest compiled and minified CSS -->
<script 
src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"> 
</script> 

<!-- vidhandler component -->
<script>
AFRAME.registerComponent('vidhandler', {
schema: {
  target: {type: 'string'}
},
init: function() {
    this.videoNodes = document.querySelectorAll(this.data.target)
},
tick: function() {
    if (this.el.object3D.visible == true) {
        if (!this.toggle) {
            this.toggle = true;
            for (let i = 0; i < this.videoNodes.length; i++) {
                this.videoNodes[i].play();
            } 
        }
    } else {
        if (this.toggle) {
          for (let i = 0; i < this.videoNodes.length; i++) {
            this.videoNodes[i].pause();
          }
          this.toggle = false;
        }
    }
}
});
</script>

<!-- assets for vidhandler -->
    
</head>

<body style="margin : 0px; overflow: hidden;">
    <a-scene embedded artoolkit='sourceType: webcam; debugUIEnabled: false; detectionMode: mono; maxDetectionRate: 60; canvasWidth: 200; canvasHeight: 200'>
        <a-assets>
            <video crossOrigin="Anonymous" id="vid" loop="true" src="./res/sheep.mp4" playsinline></video>
            <video crossOrigin="Anonymous" id="videonew" loop="true" src="./res/box.mp4" playsinline></video>
            <video id="packs" autoplay muted loop="true" src="./res/packs.mp4" playsinline></video>
            <video id="vant" autoplay muted loop="true" src="./res/packs.mp4" playsinline></video>
            <video id="saude" autoplay muted loop="true" src="./res/packs.mp4" playsinline></video>
            <video id="serv" autoplay muted loop="true" src="./res/packs.mp4" playsinline></video>
        </a-assets>
        <a-marker vidhandler="target: #vid, #videonew id="memarker" type="pattern" url="./patt/hiro.patt"> <!-- VERSO -->
            <a-plane  position='0 .3 0' width='3' height='2' rotation="-90 0 0" material='transparent:true;alphaTest:0;src:#vid'></a-plane>
            <a-plane  position='0 .2 0' width='1.5' height='1.5' rotation="-90 0 0" material='src:#videonew'></a-plane>
        </a-marker>
                                                                                   
        <a-marker vidhandler="target: #vid, #videonew" type="barcode" value="8"> <!-- VANTAGENS -->
            <a-plane  position='0 .3 0' width='3' height='2' rotation="-90 0 0" material='transparent:true;alphaTest:0;src:#vid'></a-plane>
            <a-plane  position='0 .2 0' width='1.5' height='1.5' rotation="-90 0 0" material='src:#videonew'></a-plane>
        </a-marker>
                                                                                   
                                                                                   
        <a-marker type="barcode" value="12"> <!-- FRENTE -->
            <a-video src="#box" width="3" height="1.25" rotation="0 0 0" position="0 0 0"></a-video>
        </a-marker>
                <a-marker type="barcode" value="14"> <!-- SAUDE -->
            <a-video src="#saude" width="3" height="1.25" rotation="0 0 0" position="0 0 0"></a-video>
        </a-marker>
                <a-marker type="barcode" value="15"> <!-- FUNCIONA -->
            <a-video src="#serv" width="3" height="1.25" rotation="0 0 0" position="0 0 0"></a-video>
        </a-marker>
                <a-marker type="barcode" value="31"> <!-- PACKS -->
            <a-video src="#packs" width="3" height="1.25" rotation="0 0 0" position="0 0 0"></a-video>
        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>
</body>

</html>
