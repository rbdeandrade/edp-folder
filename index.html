<!DOCTYPE html>
<html>
    
<head>
    <meta charset="utf-8">
    <title>PACKS LIVING EDP</title>
    <meta name="description" content="PACKS LIVING EDP">
    <script src="https://aframe.io/releases/0.8.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/jeromeetienne/AR.js/2.0.5/aframe/build/aframe-ar.js"></script>
</head>
    
<body style='margin : 0px; overflow: hidden;'>
    
    <a-scene embedded arjs='detectionMode: mono_and_matrix; trackingMethod: best; sourceType: webcam; debugUIEnabled: true;'>
        
        <a-assets>
            <a-asset-item id='sheep' src='./res/sheep.mp4'></a-asset-item>
            <a-asset-item id='box' src='./res/box.mp4'></a-asset-item>
            <a-asset-item id='pack' src='./res/pack.mp4'></a-asset-item>
        </a-assets>

<!-- Folder -->
        
        <a-marker preset="hiro">
            <a-video  preload="auto" loop="true" src="#box" width="3" height="1.25" rotation="0 0 0" position="0 0 0"></a-video>
        </a-marker>
        
        <a-entity camera></a-entity>
        
    </a-scene>

</body>
</html>
