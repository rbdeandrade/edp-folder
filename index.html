
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR • PACKS LIVING EDP</title>
    <meta name="description" content="AR • PACKS LIVING EDP">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <script src="https://aframe.io/releases/0.9.2/aframe.min.js"></script>
    <script src="https://rawgit.com/jeromeetienne/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin : 0px; overflow: hidden;">
    <a-scene embedded arjs="detectionMode: mono_and_matrix; trackingMethod: best; sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets>
            <video id="packs" autoplay loop="true" src="./res/packs.mp4"></video>
            <video id="box" autoplay muted loop="true" src="./res/box.mp4"></video>
            <video id="sheep" autoplay muted loop="true" src="./res/sheep.mp4"></video>
            <img id="saude" src="./res/ambulance.png">
            <img id="vantagens" src="./res/party.png">
            <img id="funciona" src="./res/handyman.png">
        </a-assets>

<!-- Folder -->

        <a-marker preset="hiro"> <!-- BACK -->
            <a-video src="#sheep" width="4" height="2.25" position="0 0 0" rotation="-90 0 0"></a-video>
        </a-marker>

        <a-marker type="barcode" value="12"> <!-- FRONT -->
            <a-video src="#box" width="4" height="2.25" position="0 0 0" rotation="-90 0 0"></a-video>
        </a-marker>

        <a-marker type="barcode" value="15"> <!-- FUNCIONA -->
            <a-image src="#funciona" rotation="-90 0 0"></a-image>
        </a-marker>
        
        <a-marker type="barcode" value="14"> <!-- SAUDE -->
            <<a-image src="#saude" rotation="-90 0 0"></a-image>
        </a-marker>
        
        <a-marker type="barcode" value="8"> <!-- VANTAGENS -->
            <a-image src="#vantagens" rotation="-90 0 0"></a-image>
        </a-marker>
        
        <a-marker type="barcode" value="31"> <!-- PAKS LIVING EDP -->
            <a-video src="#packs" width="4" height="2.25" position="0 0 0" rotation="-90 0 0"></a-video>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
