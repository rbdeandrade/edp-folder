
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR • PACKS LIVING EDP</title>
    <meta name="description" content="AR • PACKS LIVING EDP">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <script src="https://aframe.io/releases/0.9.2/aframe.min.js"></script>
    <script src="https://cdn.rawgit.com/jeromeetienne/AR.js/1.7.7/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin : 0px; overflow: hidden;">
    
        <a-assets>
            <video id="packs" autoplay loop="true" src="./res/packs.mp4"></video>
            <video id="box" autoplay muted loop="true" src="./res/box.mp4"></video>
            <video id="sheep" autoplay muted loop="true" src="./res/sheep.mp4"></video>
            <img id="saude" src="./res/pack_azul.jpg">
            <img id="vantagens" src="./res/pack_laranja.jpg">
            <img id="funciona" src="./res/pack_vermelho.jpg">
        </a-assets>
    
    <a-scene embedded arjs="detectionMode: mono_and_matrix; trackingMethod: best; sourceType: webcam; debugUIEnabled: false;">

<!-- Folder -->

        <a-marker preset="hiro"> <!-- BACK -->
            <a-video src="#sheep" position="0 0.5 0" rotation="270 0 0" play="true">         
            </a-video>
        </a-marker>

        <a-marker type="barcode" value="12"> <!-- FRONT -->
            <a-video src="#box" position="0 0.5 0" rotation="270 0 0" play="true">
            </a-video>
        </a-marker>

        <a-marker type="barcode" value="15"> <!-- FUNCIONA -->
            <a-box src="#funciona" depth="1" height="1" width="1">
            </a-box>
        </a-marker>
        
        <a-marker type="barcode" value="14"> <!-- SAUDE -->
            <a-box animation="property: rotation; to: 0 360 0; dur: 1000; easing: linear" src="#saude" depth="1" height="1" width="1">
            </a-box>
        </a-marker>
        
        <a-marker type="barcode" value="8"> <!-- VANTAGENS -->
            <a-box src="#vantagens" depth="1" height="1" width="1">
            </a-box>
        </a-marker>
        
        <a-marker type="barcode" value="31"> <!-- PAKS LIVING EDP -->
            <a-video src="#packs" position="0 0.5 0" rotation="270 0 0" play="true"></a-video>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
    
    <script>
      window.addEventListener('click', function () {
      var v = document.querySelector('#packs' );
      v.play();
      });
    </script>
    <script>
      window.addEventListener('click', function () {
      var x = document.querySelector('#sheep' );
      x.play();
      });
    </script>
    <script>
      window.addEventListener('click', function () {
      var y = document.querySelector('#box' );
      y.play();
      });
    </script>
</body>
</html>
