<!DOCTYPE html>
<html>
    
<head>
    <meta charset='utf-8'>
    <title>AR • EDP PACKS</title>
    <meta name='description' content='AR • EDP PACKS'>
    <meta name='viewport' content='width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0'>
    <script src='https://aframe.io/releases/0.9.2/aframe.min.js'></script>
    <script src='https://rawgit.com/jeromeetienne/AR.js/master/aframe/build/aframe-ar.js'></script>
    
      <script>
            AFRAME.registerComponent('vidhandler', {
                init: function() {
                    this.toggle = false;
                    this.vid = document.querySelector("#vid");
                    this.vid.pause();
                },
                tick: function() {
                    if (this.el.object3D.visible == true) {
                        if (!this.toggle) {
                            this.toggle = true;
                            this.vid.play();
                        }
                    } else {
                        this.toggle = false;
                        this.vid.pause();
                    }
                }
            });

            function refrespage() {
                location.reload();
            }

            function playvid() {
                vid.play();
            }
        </script>

</head>
    
<body style='margin : 0px; overflow: hidden;'>
    
    <a-scene embedded arjs='detectionMode: mono_and_matrix; trackingMethod: best; sourceType: webcam; debugUIEnabled: false; vr-mode-ui="enabled: false";'>
        
        <a-assets>
            <video preload="auto" id="vid" poster="ANY IMAGE PATH (THUMBNAIL)" response-type="arraybuffer" loop="true" autoplay type="video/mp4" crossorigin webkit-playsinline playsinline controls>
                <source  type="video/mp4" src="./res/sheep.mp4">
                <img src="ANY IMAGE PATH (THUMBNAIL)"> Your browser does not support Or Else Please Click Reset Button.
            </video>

        <a-marker crossorigin="anonymous" id='memarker' type='pattern' url='./patt/hiro.patt' vidhandler> <!-- VERSO -->
            <a-plane  position='0 0.1 0' scale="2 2 2" rotation="-90 0 0" material='transparent:true;alphaTest:0;src:#vid'></a-plane>
        </a-marker>
